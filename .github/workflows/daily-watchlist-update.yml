name: Daily AI Watchlist Update

on:
  schedule:
    - cron: "30 0 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-watchlist-update
  cancel-in-progress: true

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate daily watchlist report
        run: python scripts/generate_ai_watchlist_report.py

      - name: Commit refreshed outputs
        id: commit_changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/ai-watchlist-daily-monitor.html
          if git diff --cached --quiet; then
            echo "committed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "daily watchlist refresh"
            git push
            echo "committed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build static site bundle
        run: |
          mkdir -p _site/outputs
          cp pages/index.html _site/index.html
          cp -r outputs/* _site/outputs/

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
